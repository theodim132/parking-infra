---
- name: Deploy stack to Kubernetes
  hosts: all
  become: true
  tasks:
    - name: Create namespace
      ansible.builtin.shell: |
        microk8s kubectl get ns {{ k8s_namespace }} >/dev/null 2>&1 || microk8s kubectl create ns {{ k8s_namespace }}
      args:
        executable: /bin/bash

    - name: Apply manifests
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../k8s"
        dest: "/tmp/parking-k8s"
        mode: "0755"
      tags: copy

    - name: Apply manifests
      ansible.builtin.shell: |
        microk8s kubectl -n {{ k8s_namespace }} apply -f /tmp/parking-k8s/k8s
      args:
        executable: /bin/bash
