---
- name: Setup HTTPS with Nginx Reverse Proxy
  hosts: all
  become: yes
  vars:
    domain: "{{ fqdn }}"
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Create SSL directory
      file:
        path: /etc/nginx/ssl
        state: directory
        mode: '0755'

    - name: Generate self-signed SSL certificate
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout /etc/nginx/ssl/parking.key
        -out /etc/nginx/ssl/parking.crt
        -subj "/C=GR/ST=Attica/L=Athens/O=HUA/CN={{ domain }}"
      args:
        creates: /etc/nginx/ssl/parking.crt

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/parking
        content: |
          # HTTPS Server
          server {
              listen 443 ssl;
              server_name {{ domain }};

              ssl_certificate /etc/nginx/ssl/parking.crt;
              ssl_certificate_key /etc/nginx/ssl/parking.key;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers HIGH:!aNULL:!MD5;

              # Jenkins
              location /jenkins {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 90;
              }

              # Core API (NodePort 30080)
              location /api {
                  proxy_pass http://127.0.0.1:30080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # Keycloak (NodePort 30081)
              location /auth {
                  proxy_pass http://127.0.0.1:30081;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_buffer_size 128k;
                  proxy_buffers 4 256k;
                  proxy_busy_buffers_size 256k;
              }

              # MailHog (NodePort 30025)
              location /mailhog {
                  proxy_pass http://127.0.0.1:30025;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  # WebSocket support for MailHog
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }

              # Root - redirect to Jenkins
              location / {
                  return 301 /jenkins;
              }
          }

          # HTTP to HTTPS redirect
          server {
              listen 80;
              server_name {{ domain }};
              return 301 https://$server_name$request_uri;
          }
      notify: Reload nginx

    - name: Enable parking site
      file:
        src: /etc/nginx/sites-available/parking
        dest: /etc/nginx/sites-enabled/parking
        state: link
      notify: Reload nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Ensure nginx is started and enabled
      systemd:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded
