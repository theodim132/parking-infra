---
- name: Setup HTTPS with Nginx Reverse Proxy
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
  vars:
    domain: "{{ fqdn }}"
    letsencrypt_webroot: /var/www/letsencrypt
    allowed_nginx_configs:
      - /etc/nginx/nginx.conf
      - /etc/nginx/sites-enabled/parking
      - /etc/nginx/sites-available/parking
  tasks:
    - name: Disable MicroK8s ingress (avoid 443 conflict)
      ansible.builtin.shell: |
        if command -v microk8s >/dev/null 2>&1; then
          microk8s disable ingress || true
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Find nginx-related systemd services
      ansible.builtin.shell: |
        systemctl list-unit-files --type=service | awk '/nginx/ {print $1}'
      args:
        executable: /bin/bash
      register: nginx_units
      changed_when: false

    - name: Stop and disable non-primary nginx services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ nginx_units.stdout_lines | difference(['nginx.service']) }}"
      failed_when: false

    - name: Stop nginx service before cleanup
      ansible.builtin.service:
        name: nginx
        state: stopped

    - name: Kill stray nginx master process
      ansible.builtin.shell: |
        pkill -f "nginx: master" || true
      args:
        executable: /bin/bash
      failed_when: false

    - name: Reset nginx.conf to a clean baseline
      ansible.builtin.template:
        src: ../roles/reverse_proxy/templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        mode: "0644"

    - name: Remove any conf.d vhost files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_fileglob:
        - /etc/nginx/conf.d/*.conf

    - name: Remove legacy Jenkins site configs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/jenkins
        - /etc/nginx/sites-available/jenkins

    - name: Remove domain server blocks from nginx.conf
      ansible.builtin.shell: |
        set -e
        if [ -f /etc/nginx/nginx.conf ]; then
          cp /etc/nginx/nginx.conf /etc/nginx/nginx.conf.bak-parking
          python3 - <<'PY'
        import re
        from pathlib import Path

        domain = "{{ domain }}"
        path = Path("/etc/nginx/nginx.conf")
        text = path.read_text()
        lines = text.splitlines(keepends=True)

        out = []
        buf = []
        in_server = False
        depth = 0
        server_depth = 0
        for line in lines:
            # update brace depth after capturing line to keep block integrity
            opens = line.count("{")
            closes = line.count("}")
            if not in_server and "server" in line and "{" in line:
                # server blocks are under http { } so depth >= 1
                if depth >= 1 and re.search(r"\bserver\b", line):
                    in_server = True
                    server_depth = depth
                    buf = [line]
                else:
                    out.append(line)
            elif in_server:
                buf.append(line)
            else:
                out.append(line)

            depth += opens - closes

            if in_server and depth == server_depth:
                block = "".join(buf)
                if re.search(rf"server_name\\s+{re.escape(domain)}\\b", block):
                    # drop this server block
                    pass
                else:
                    out.append(block)
                in_server = False
                buf = []

        path.write_text("".join(out))
        PY
        fi
      args:
        executable: /bin/bash

    - name: Find Nginx config files that declare this domain
      ansible.builtin.shell: |
        nginx -T 2>/dev/null | awk '
          /^# configuration file / { file=$4 }
          $0 ~ /server_name/ && $0 ~ /{{ domain }}/ { print file }
        ' | sort -u
      args:
        executable: /bin/bash
      register: nginx_conflicts
      changed_when: false

    - name: Remove conflicting Nginx configs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ nginx_conflicts.stdout_lines | reject('in', allowed_nginx_configs) | list }}"

    - name: Configure HTTP site for ACME
      ansible.builtin.include_role:
        name: reverse_proxy
      vars:
        reverse_proxy_mode: http

    - name: Obtain Let's Encrypt certificate
      ansible.builtin.include_role:
        name: certbot

    - name: Configure HTTPS reverse proxy
      ansible.builtin.include_role:
        name: reverse_proxy
      vars:
        reverse_proxy_mode: https
