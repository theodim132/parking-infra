---
- name: Create project root
  ansible.builtin.file:
    path: "{{ project_root }}"
    state: directory
    mode: "0755"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: "{{ compose_template }}"
    dest: "{{ compose_path }}"
    mode: "0644"

- name: Pull images
  ansible.builtin.shell: |
    docker compose -f {{ compose_path }} pull
  args:
    executable: /bin/bash

- name: Start stack
  ansible.builtin.shell: |
    docker compose -f {{ compose_path }} up -d
  args:
    executable: /bin/bash
