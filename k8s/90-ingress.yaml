apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parking-ingress
  namespace: parking
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers: "8 16k"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "24k"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: public
  tls:
    - hosts:
        - parking-demo.swedencentral.cloudapp.azure.com
      secretName: parking-tls
  rules:
    - host: parking-demo.swedencentral.cloudapp.azure.com
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parking-mailhog-ingress
  namespace: parking
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: public
  tls:
    - hosts:
        - parking-demo.swedencentral.cloudapp.azure.com
      secretName: parking-tls
  rules:
    - host: parking-demo.swedencentral.cloudapp.azure.com
      http:
        paths:
          - path: /mailhog(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: mailhog
                port:
                  number: 8025
