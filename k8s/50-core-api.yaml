apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: parking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
        - name: core-api
          image: localhost:32000/parking-core-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: parking-secrets
                  key: CONNECTIONSTRINGS_DEFAULT
            - name: Auth__Authority
              valueFrom:
                configMapKeyRef:
                  name: parking-config
                  key: AUTH_AUTHORITY
            - name: Auth__RequireHttpsMetadata
              valueFrom:
                configMapKeyRef:
                  name: parking-config
                  key: AUTH_REQUIRE_HTTPS_METADATA
            - name: Auth__Audience
              valueFrom:
                configMapKeyRef:
                  name: parking-config
                  key: AUTH_AUDIENCE
            - name: Auth__ClientId
              valueFrom:
                configMapKeyRef:
                  name: parking-config
                  key: AUTH_CLIENT_ID
            - name: Auth__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: parking-secrets
                  key: AUTH_CLIENT_SECRET
            - name: Storage__Provider
              valueFrom:
                configMapKeyRef:
                  name: parking-config
                  key: STORAGE_PROVIDER
            - name: Storage__Endpoint
              valueFrom:
                configMapKeyRef:
                  name: parking-config
                  key: STORAGE_ENDPOINT
            - name: Storage__Bucket
              valueFrom:
                configMapKeyRef:
                  name: parking-config
                  key: STORAGE_BUCKET
            - name: Storage__ForcePathStyle
              valueFrom:
                configMapKeyRef:
                  name: parking-config
                  key: STORAGE_FORCE_PATH_STYLE
            - name: Storage__AccessKey
              valueFrom:
                secretKeyRef:
                  name: parking-secrets
                  key: STORAGE_ACCESS_KEY
            - name: Storage__SecretKey
              valueFrom:
                secretKeyRef:
                  name: parking-secrets
                  key: STORAGE_SECRET_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: parking-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: dataprotection-keys
              mountPath: /app/keys
      volumes:
        - name: dataprotection-keys
          persistentVolumeClaim:
            claimName: core-api-keys-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: core-api-keys-pvc
  namespace: parking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: parking
spec:
  type: NodePort
  selector:
    app: core-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
