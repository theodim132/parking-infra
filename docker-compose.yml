version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
      POSTGRES_DB: parking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ../parking-auth/realm:/opt/keycloak/data/import:ro

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  core-api:
    image: parking-core-api:dev
    build:
      context: ../parking-core-api/Parking.CoreApi
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=parking;Username=parking;Password=parking
      Auth__Authority: http://keycloak:8080/realms/parking
      Auth__Audience: parking-api
      Storage__Provider: S3
      Storage__RootPath: /app/storage
      Storage__Endpoint: http://minio:9000
      Storage__AccessKey: minioadmin
      Storage__SecretKey: minioadmin
      Storage__Bucket: parking-docs
      Storage__ForcePathStyle: "true"
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - keycloak
      - minio
    volumes:
      - core_storage:/app/storage

  email-worker:
    image: parking-email-worker:dev
    build:
      context: ../parking-email-worker/Parking.EmailWorker
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=parking;Username=parking;Password=parking
      Email__Host: mailhog
      Email__Port: 1025
      Email__From: noreply@parking.local
    depends_on:
      - postgres
      - mailhog

volumes:
  postgres_data:
  minio_data:
  core_storage:
